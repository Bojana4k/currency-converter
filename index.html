<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات الاحترافي</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: 50px auto;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
    }

    .live {
      font-size: 12px;
      color: #00ffcc;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      color: #00ffcc;
    }

    .quick {
      margin-top: 20px;
      text-align: right;
    }

    .quick a {
      display: block;
      margin: 5px 0;
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
    }

    .quick a:hover {
      color: #fff;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💱 محول العملات</h2>
  <div class="live">● تحديث مباشر</div>

  <input type="number" id="amount" placeholder="أدخل المبلغ" oninput="convert()">

  <div class="row">
    <select id="from" onchange="convert()"></select>
    <select id="to" onchange="convert()"></select>
  </div>

  <button onclick="convert()">تحويل الآن</button>

  <div class="result" id="result"></div>

  <div class="quick">
    <strong>أكثر عمليات البحث:</strong>
    <a href="usd-to-kwd.html">تحويل الدولار إلى الدينار</a>
    <a href="eur-to-kwd.html">تحويل اليورو إلى الدينار</a>
    <a href="kwd-to-sar.html">تحويل الدينار إلى الريال</a>
  </div>
</div>

<script>
  const currencies = ["USD","EUR","KWD","SAR","AED","GBP","JPY","CNY"];

  const fromSelect = document.getElementById("from");
  const toSelect = document.getElementById("to");

  currencies.forEach(c => {
    fromSelect.innerHTML += `<option value="${c}">${c}</option>`;
    toSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  fromSelect.value = "USD";
  toSelect.value = "KWD";

  async function convert() {
    const amount = document.getElementById('amount').value;
    const from = fromSelect.value;
    const to = toSelect.value;

    if (!amount) {
      document.getElementById('result').innerText = "";
      return;
    }

    try {
      const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
      const data = await response.json();

      const rate = data.rates[to];
      const result = amount * rate;

      document.getElementById('result').innerText = `${result.toFixed(3)} ${to}`;
    } catch (error) {
      document.getElementById('result').innerText = "خطأ في الاتصال";
    }
  }

  convert();
</script>

</body>
</html>
