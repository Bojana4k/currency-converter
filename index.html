<!DOCTYPE html>
<meta name="google-site-verification" content="F1JZ8SrtKsnEmNzvYt2bZI5LJed9G3YLlz_puw1T8k0" /><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات وسعر الذهب اليوم</title>

  <!-- SEO -->
  <meta name="description" content="أفضل موقع لتحويل العملات وسعر الذهب اليوم في الكويت بشكل مباشر وفوري.">
  <meta name="keywords" content="تحويل العملات, سعر الدولار, سعر اليورو, سعر الذهب اليوم">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      font-size: 22px;
    }

    .live {
      color: #00ffcc;
      font-size: 12px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      font-size: 24px;
      color: #00ffcc;
    }

    .gold {
      margin-top: 20px;
      padding: 10px;
      background: rgba(255,215,0,0.1);
      border-radius: 12px;
    }

    .quick a {
      display: block;
      color: #ccc;
      margin: 5px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💱 محول العملات</h1>
  <div class="live">● تحديث مباشر</div>

  <input type="number" id="amount" placeholder="أدخل المبلغ" oninput="convert()">

  <div class="row">
    <select id="from" onchange="convert()"></select>
    <select id="to" onchange="convert()"></select>
  </div>

  <button onclick="convert()">تحويل</button>

  <div class="result" id="result"></div>

  <div class="gold" id="gold">جاري تحميل سعر الذهب...</div>

  <div class="quick">
    <strong>روابط مهمة:</strong>
    <a href="usd-to-kwd.html">تحويل الدولار إلى الدينار</a>
    <a href="eur-to-kwd.html">تحويل اليورو إلى الدينار</a>
  </div>
</div>

<script>
const currencies = {
  USD: "🇺🇸 USD",
  EUR: "🇪🇺 EUR",
  KWD: "🇰🇼 KWD",
  SAR: "🇸🇦 SAR",
  AED: "🇦🇪 AED",
  GBP: "🇬🇧 GBP"
};

const fromSelect = document.getElementById("from");
const toSelect = document.getElementById("to");

Object.keys(currencies).forEach(c => {
  fromSelect.innerHTML += `<option value="${c}">${currencies[c]}</option>`;
  toSelect.innerHTML += `<option value="${c}">${currencies[c]}</option>`;
});

// كشف عملة المستخدم
const userLang = navigator.language;
if (userLang.includes("ar")) {
  fromSelect.value = "KWD";
  toSelect.value = "USD";
} else {
  fromSelect.value = "USD";
  toSelect.value = "KWD";
}

async function convert() {
  const amount = document.getElementById('amount').value;
  const from = fromSelect.value;
  const to = toSelect.value;

  if (!amount) return;

  const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
  const data = await res.json();

  const result = amount * data.rates[to];
  document.getElementById('result').innerText = result.toFixed(3) + ' ' + to;
}

// سعر الذهب (تقريبي)
async function goldPrice() {
  try {
    const res = await fetch('https://api.gold-api.com/price/XAU');
    const data = await res.json();
    document.getElementById('gold').innerText = 'سعر الذهب اليوم: ' + data.price + ' USD';
  } catch {
    document.getElementById('gold').innerText = 'تعذر تحميل سعر الذهب';
  }
}

goldPrice();
</script>

</body>
</html>
