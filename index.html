<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات في الكويت</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 95%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💱 محول العملات</h2>

  <input type="number" id="amount" placeholder="أدخل المبلغ">

  <select id="from"></select>
  <select id="to"></select>

  <button onclick="convert()">تحويل</button>

  <div class="result" id="result"></div>
</div>

<script>
  const currencies = ["USD","EUR","KWD","SAR","AED","GBP","JPY","CNY"];

  const fromSelect = document.getElementById("from");
  const toSelect = document.getElementById("to");

  currencies.forEach(c => {
    fromSelect.innerHTML += `<option value="${c}">${c}</option>`;
    toSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  fromSelect.value = "USD";
  toSelect.value = "KWD";

  async function convert() {
    const amount = document.getElementById('amount').value;
    const from = fromSelect.value;
    const to = toSelect.value;

    if (!amount) {
      alert("ادخل مبلغ");
      return;
    }

    try {
      const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
      const data = await response.json();

      const rate = data.rates[to];
      const result = amount * rate;

      document.getElementById('result').innerText = `${result.toFixed(3)} ${to}`;
    } catch (error) {
      document.getElementById('result').innerText = "خطأ في الاتصال";
    }
  }
</script>

</body>
</html>
