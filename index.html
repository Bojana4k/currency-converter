<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات الاحترافي</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p.desc {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💱 محول العملات</h2>
  <p class="desc">تحويل العملات لحظياً بأسعار دقيقة ومحدثة</p>

  <input type="number" id="amount" placeholder="أدخل المبلغ">

  <div class="row">
    <select id="from"></select>
    <select id="to"></select>
  </div>

  <button onclick="convert()">تحويل الآن</button>

  <div class="result" id="result"></div>
  <div class="footer">يتم التحديث حسب السوق العالمي</div>
</div>

<script>
  const currencies = ["USD","EUR","KWD","SAR","AED","GBP","JPY","CNY"];

  const fromSelect = document.getElementById("from");
  const toSelect = document.getElementById("to");

  currencies.forEach(c => {
    fromSelect.innerHTML += `<option value="${c}">${c}</option>`;
    toSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  fromSelect.value = "USD";
  toSelect.value = "KWD";

  async function convert() {
    const amount = document.getElementById('amount').value;
    const from = fromSelect.value;
    const to = toSelect.value;

    if (!amount) {
      alert("ادخل مبلغ");
      return;
    }

    try {
      const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
      const data = await response.json();

      const rate = data.rates[to];
      const result = amount * rate;

      document.getElementById('result').innerText = `${result.toFixed(3)} ${to}`;
    } catch (error) {
      document.getElementById('result').innerText = "خطأ في الاتصال";
    }
  }
</script>

</body>
</html>
